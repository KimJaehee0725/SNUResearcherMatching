services:
  demo:
    build:
      context: .
      dockerfile: Dockerfile
    image: snu-researcher-matching-demo:latest
    working_dir: /workspace/codes/demo
    command:
      - python
      - main.py
      - --model_path
      - /workspace/trained_model
      - --research_corpus_path
      - /workspace/data/research_translation_final.csv
      - --project_corpus_path
      - /workspace/data/project_translation_final.csv
      - --research_new_prof_path
      - /workspace/data/new_researchers/research_new_prof_10.txt
      - --project_new_prof_path
      - /workspace/data/new_researchers/project_new_prof_10.txt
      - --index_path
      - /workspace/data/demo/ver1
      - --device
      - ${DEMO_DEVICE:-cuda:0}
      - --server_name
      - 0.0.0.0
      - --server_port
      - "7860"
      - --share
      - "false"
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: "7860"
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    ports:
      - "${DEMO_PORT:-7860}:7860"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - .:/workspace/codes:ro
      - ./data:/workspace/data:ro
      - ./trained_model:/workspace/trained_model:ro
    gpus: all
